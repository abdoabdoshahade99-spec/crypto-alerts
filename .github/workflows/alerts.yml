name: crypto-alerts

on:
  schedule:
    - cron: '45 22 * * 0-4'  # افتتاح طوكيو
    - cron: '45 7 * * 1-5'   # افتتاح لندن + إغلاق طوكيو
    - cron: '15 13 * * 1-5'  # افتتاح أمريكا
    - cron: '45 16 * * 1-5'  # إغلاق لندن
    - cron: '45 19 * * 1-5'  # إغلاق أمريكا
  workflow_dispatch:

jobs:
  test-manual:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python bot.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MESSAGE: "test - البوت يعمل بنجاح"

