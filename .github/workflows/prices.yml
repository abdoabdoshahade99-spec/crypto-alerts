name: crypto-prices

on:
  schedule:
    - cron: '0 8 * * 1-5'   # 11:00 ظهراً بتوقيت تركيا
    - cron: '0 14 * * 1-5'  # 5:00 مساءً بتوقيت تركيا
  workflow_dispatch:

jobs:
  post-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python price_bot.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
